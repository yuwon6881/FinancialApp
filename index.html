<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#090d16" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>financialapp</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #090d16;
        color: #ffffff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        overflow: hidden;
      }
      
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #090d16;
        z-index: 9999;
      }

      .glow-1 {
        position: absolute;
        top: 30%;
        left: 30%;
        transform: translate(-50%, -50%);
        width: 24rem;
        height: 24rem;
        border-radius: 9999px;
        background-color: rgba(59, 130, 246, 0.08);
        filter: blur(64px);
        animation: pulse-glow-1 4s infinite ease-in-out;
      }

      .glow-2 {
        position: absolute;
        bottom: 30%;
        right: 30%;
        transform: translate(50%, 50%);
        width: 24rem;
        height: 24rem;
        border-radius: 9999px;
        background-color: rgba(16, 185, 129, 0.08);
        filter: blur(64px);
        animation: pulse-glow-2 4s infinite ease-in-out;
        animation-delay: 2s;
      }

      @keyframes pulse-glow-1 {
        0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
        50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      }

      @keyframes pulse-glow-2 {
        0%, 100% { opacity: 0.6; transform: translate(50%, 50%) scale(1); }
        50% { opacity: 1; transform: translate(50%, 50%) scale(1.1); }
      }

      .logo-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        text-align: center;
        position: relative;
        z-index: 10;
      }

      .logo-f {
        display: flex;
        width: 4rem;
        height: 4rem;
        align-items: center;
        justify-content: center;
        border-radius: 1rem;
        background: radial-gradient(circle, #3b82f6 0%, #10b981 100%);
        box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.1), 0 8px 10px -6px rgba(59, 130, 246, 0.1);
        color: #ffffff;
        font-weight: 900;
        font-size: 1.875rem;
        animation: pulse-logo 2s infinite ease-in-out;
      }

      @keyframes pulse-logo {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }

      .brand-name {
        font-size: 0.875rem;
        font-weight: 900;
        letter-spacing: 0.1em;
        color: #ffffff;
        text-transform: uppercase;
        margin: 0;
      }

      .loading-status {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        font-size: 0.75rem;
        font-weight: 700;
        color: #a1a1aa;
        margin-top: 0.25rem;
      }

      .spinner {
        width: 1rem;
        height: 1rem;
        border: 2px solid rgba(16, 185, 129, 0.2);
        border-top: 2px solid #10b981;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
        <div class="logo-container">
          <div class="logo-f">F</div>
          <div>
            <h2 class="brand-name">FinancialApp</h2>
            <div class="loading-status">
              <div class="spinner"></div>
              <span>Initializing secure ledger session...</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
